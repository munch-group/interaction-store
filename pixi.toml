[project]
name = "interaction-store"
version = "0.1.0"
description = "INDRA-based mechanistic interaction store with MCP server"
channels = ["conda-forge", "bioconda", "munch-group"]
platforms = ["osx-arm64", "linux-64"]

[dependencies]
python = ">=3.11"
networkx = "*"
matplotlib = "*"
notebook = "*"
jupyterlab = "*"
nodejs = ">=25.7.0,<25.8"
ipykernel = ">=7.2.0,<8"
nbconvert = ">=7.17.0,<8"
vscodenb = ">=0.1.46,<0.2"
pygraphviz = ">=1.14,<2"
pycirclize = ">=1.10.1,<2"
graph-tool = ">=2.98,<3"
pyvis = ">=0.3.2,<0.4"
ipycytoscape = ">=1.3.3,<2"
git = ">=2.53.0,<3"
gh = ">=2.88.1,<3"
git-lfs = ">=3.7.1,<4"
geneinfo = ">=5.6.24,<6"

[pypi-dependencies]
indra = "*"
fastmcp = "*"

[tasks]
# Start the MCP server (stdio — used by Claude Code via .mcp.json)
mcp = "python mcp_server.py"

# Start the MCP server in SSE mode for debugging in a browser
mcp-debug = "python mcp_server.py --port 8765"

# Open the analysis notebook
notebook = "jupyter lab interaction_store.ipynb"

# Render the network graph
render = "python -c \"import sys; sys.path.insert(0,'.'); from mcp_server import render_network; print(render_network())\""
